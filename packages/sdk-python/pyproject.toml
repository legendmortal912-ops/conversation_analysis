[project]
name = "convoguard-py"
version = "1.0.0"
description = "ConvoGuard Python SDK — Real-time AI manipulation detection"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "ConvoGuard" }]
keywords = ["convoguard", "ai", "manipulation", "detection", "analytics", "nlp", "ethics"]

dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
async = ["httpx[http2]"]
django = ["django>=4.0"]
fastapi = ["fastapi>=0.100.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["convoguard"]

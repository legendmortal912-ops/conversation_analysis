# Netlify Configuration for ConvoGuard Monorepo

[build]
  base = ""
  publish = "apps/dashboard-frontend/dist"
  command = "turbo run build --filter=@convoguard/dashboard-frontend"

# 1. Route API Gateway traffic to production gateway URL
[[redirects]]
  from = "/api/v1/*"
  to = "http://54.82.212.132.nip.io:3000/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/graphql"
  to = "http://54.82.212.132.nip.io:3000/graphql"
  status = 200
  force = true

[[redirects]]
  from = "/ingest/*"
  to = "http://54.82.212.132.nip.io:3000/ingest/:splat"
  status = 200
  force = true

# 2. Redirect all other traffic to index.html (Required for React Router client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
